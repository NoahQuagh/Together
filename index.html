<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Together</title>
  <link rel="stylesheet" href="assets/style/paletteStyle.css">
  <link rel="stylesheet" href="assets/style/index.css">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap"
        rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>

<header>

  <section class="header-disposition-top">
    <div class="header-disposition-left" style="margin-left: 5px;">
      <div class="menu menu-header tooltip-container">
        <i class="ti ti-menu-2" aria-hidden="true"></i>
        <span class="tooltip-text menuHelp">Open menu</span>
      </div>
      <h3>TOGETHER</h3>
    </div>

    <div class="header-disposition-left">
      <div class="menu-header menu account-menu tooltip-container">
        <i class="ti ti-settings-2" aria-hidden="true"></i>
        <span class="tooltip-text userHelp">Setting</span>
      </div>
      <div class="menu-header menu account-menu tooltip-container">
        <i class="ti ti-user" aria-hidden="true"></i>
        <span class="tooltip-text userHelp">Open user menu</span>
      </div>
    </div>
  </section>

  <section class="header-disposition-bottom">

    <div class="header-disposition-line">

      <a href="#" class="nav-item active-nav">
        <div class="item">
          <i class="ti ti-layout-dashboard" aria-hidden="true"></i>
          <h4>Dashboard</h4>
        </div>
      </a>

      <a href="#" class="nav-item">
        <div class="item">
          <i class="ti ti-folder" aria-hidden="true"></i>
          <h4>Mes projets</h4>
        </div>
      </a>

      <a href="#" class="nav-item">
        <div class="item">
          <i class="ti ti-users" aria-hidden="true"></i>
          <h4>Contributions</h4>
        </div>
      </a>

      <a href="#" class="nav-item">
        <div class="item">
          <i class="ti ti-checklist" aria-hidden="true"></i>
          <h4>Mes tâches</h4>
        </div>
      </a>

      <a href="#" class="nav-item">
        <div class="item">
          <i class="ti ti-calendar" aria-hidden="true"></i>
          <h4>Calendrier</h4>
        </div>
      </a>

      <a href="#" class="nav-item">
        <div class="item">
          <i class="ti ti-bell" aria-hidden="true"></i>
          <h4>Notifications</h4>
        </div>
      </a>

      <a href="#" class="nav-item">
        <div class="item">
          <i class="ti ti-chart-bar" aria-hidden="true"></i>
          <h4>Statistiques</h4>
        </div>
      </a>

    </div>

  </section>

</header>

</body>
</html>
